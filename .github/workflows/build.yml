name: Build EXE
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Libs
        run: pip install pyinstaller requests psutil
      - name: Build
        run: pyinstaller --onefile --noconsole --name "ApexVerify" verification_tool.py
      - name: Save
        uses: actions/upload-artifact@v3
        with:
          name: ResultEXE
          path: dist/ApexVerify.exe
